<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NEXRA ADMIN | Node Command Engine</title>
    
    <!-- Enterprise Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #000000;
            --surface: #ffffff;
            --accent-success: #00c853;
            --accent-error: #ff3b30;
            --accent-branded: #5d4037;
            --bg-body: #f4f7f9;
            --border-subtle: rgba(0,0,0,0.06);
            --sidebar-width: 280px;
            --transition-smooth: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 1. LAYOUT ARCHITECTURE */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            width: 100%; height: 100vh; 
            overflow: hidden; 
            background: var(--bg-body); 
            color: var(--primary); 
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .admin-layout { display: flex; width: 100%; height: 100%; }

        /* SIDEBAR (DESKTOP) */
        .admin-sidebar {
            width: var(--sidebar-width);
            height: 100%;
            background: var(--primary);
            color: var(--surface);
            display: flex;
            flex-direction: column;
            z-index: 2000;
            transition: var(--transition-smooth);
        }

        .sidebar-head {
            padding: 30px 25px;
            display: flex; align-items: center; gap: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar-head img { width: 40px; height: 42px; border-radius: 10px; background: #fff; padding: 4px; }
        .sidebar-head h2 { font-family: 'Outfit'; font-size: 18px; font-weight: 800; }

        .sidebar-nav { flex: 1; overflow-y: auto; padding: 20px 15px; scrollbar-width: none; }
        .nav-label { font-size: 10px; font-weight: 800; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1.5px; margin: 20px 10px 10px; }

        .menu-item {
            display: flex; align-items: center; gap: 14px; padding: 14px 18px;
            color: rgba(255,255,255,0.6); text-decoration: none; font-size: 13px;
            font-weight: 600; border-radius: 14px; transition: 0.3s; margin-bottom: 4px;
        }
        .menu-item:hover, .menu-item.active { background: rgba(255,255,255,0.1); color: var(--surface); }
        .menu-item svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; }

        /* MAIN VIEWPORT */
        .main-viewport { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        header {
            height: 75px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle); display: flex;
            justify-content: space-between; align-items: center; padding: 0 30px; z-index: 1000;
        }
        .mob-trigger { display: none; cursor: pointer; padding: 5px; }

        /* 2. DATA WORKSPACE */
        .workspace { flex: 1; overflow-y: auto; padding: 25px; scrollbar-width: thin; }

        /* LIVE TIER ANALYTICS (PULLING FROM VIP-CONTROL) */
        .tier-sync-bar {
            background: var(--primary); color: #fff; padding: 20px 25px;
            border-radius: 28px; margin-bottom: 30px; display: flex;
            justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .tier-info h3 { font-family: 'Outfit'; font-size: 15px; margin-bottom: 5px; }
        .tier-info p { font-size: 10px; opacity: 0.5; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .tier-badges { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .payout-chip { background: rgba(255,255,255,0.08); padding: 8px 15px; border-radius: 100px; font-size: 11px; font-weight: 800; white-space: nowrap; border: 1px solid rgba(255,255,255,0.05); }
        .payout-chip span { color: var(--accent-success); }

        /* TASK EDITOR FORM */
        .editor-card {
            background: var(--surface); border-radius: 32px; border: 1px solid var(--border-subtle);
            padding: 30px; margin-bottom: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        .field label { font-size: 10px; font-weight: 800; color: #99a2ad; text-transform: uppercase; }
        .field input, .field select, .field textarea {
            width: 100%; padding: 16px; border-radius: 16px; border: 1.5px solid #f0f3f5;
            background: #f8f9fa; font-size: 14px; font-weight: 700; outline: none; transition: 0.3s; font-family: inherit;
        }
        .field input:focus { border-color: var(--primary); background: #fff; }

        .btn-deploy {
            background: var(--primary); color: #fff; border: none; padding: 18px 40px;
            border-radius: 18px; font-weight: 900; font-size: 13px; cursor: pointer;
            margin-top: 25px; display: inline-flex; align-items: center; gap: 12px; text-transform: uppercase;
        }
        .btn-deploy:active { transform: scale(0.96); }

        /* 3. NODE GRID (REPOSNICVE FIX: 2 Mobile, 3 Desktop) */
        .node-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 50px; }
        
        .node-card {
            background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 32px;
            padding: 22px; position: relative; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column; gap: 12px;
        }
        .node-card:hover { transform: translateY(-8px); box-shadow: 0 15px 40px rgba(0,0,0,0.04); }

        /* Themed Cards */
        .node-card.theme-sponsor { border-top: 6px solid var(--accent-error); }
        .node-card.theme-branded { border-top: 6px solid var(--accent-branded); }

        .node-img { width: 100%; height: 100px; object-fit: contain; background: #f8f9fa; border-radius: 20px; padding: 10px; }
        .node-title { font-family: 'Outfit'; font-size: 15px; font-weight: 900; line-height: 1.2; color: #111; height: 36px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* Real-time Analytic Handshakes */
        .analytic-cluster {
            background: #f8f9fa; border-radius: 18px; padding: 15px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .vote-row { display: flex; justify-content: space-between; align-items: center; }
        .vote-chip { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 900; }
        .v-up { color: var(--accent-success); }
        .v-down { color: var(--accent-error); }
        .vote-chip svg { width: 14px; height: 14px; stroke-width: 3; }

        .consensus-bar { width: 100%; height: 6px; background: #eee; border-radius: 10px; overflow: hidden; }
        .consensus-fill { height: 100%; background: var(--accent-success); transition: 1s ease; }

        .node-actions { display: flex; gap: 8px; margin-top: 5px; }
        .act-btn {
            flex: 1; height: 42px; border-radius: 12px; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .btn-modify { background: #f0f3f5; color: var(--primary); }
        .btn-purge { background: #fee2e2; color: var(--accent-error); }
        .act-btn svg { width: 18px; height: 18px; }

        /* 4. RESPONSIVE MEDIA ENGINE */
        @media (max-width: 1100px) {
            .admin-sidebar { position: fixed; left: -100%; }
            .admin-sidebar.open { left: 0; box-shadow: 20px 0 60px rgba(0,0,0,0.2); }
            .mob-trigger { display: block; }
            .node-grid { grid-template-columns: repeat(2, 1fr); } /* Tablets/Large Mobile */
        }
        @media (max-width: 768px) {
            .workspace { padding: 15px; }
            .node-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } /* Exactly 2 columns on Mobile */
            .node-card { padding: 15px; border-radius: 24px; }
            .node-title { font-size: 13px; }
            .tier-sync-bar { flex-direction: column; text-align: center; gap: 15px; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="admin-layout">
        <!-- SIDEBAR DOCK -->
        <aside class="admin-sidebar" id="sidebar">
            <div class="sidebar-head">
                <img src="../assets/ui/logo.png" alt="Nexra">
                <h2>NEXRA ADMIN</h2>
            </div>
            <div class="sidebar-nav">
                <div class="nav-label">Protocol</div>
                <a href="index.html" class="menu-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> Overview
                </a>
                <div class="nav-label">Technical</div>
                <a href="task-editor.html" class="menu-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg> Node Terminal
                </a>
                <a href="users.html" class="menu-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg> Users
                </a>
                <a href="vip-control.html" class="menu-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg> VIP Config
                </a>
            </div>
        </aside>

        <!-- MAIN VIEWPORT -->
        <main class="main-viewport">
            <header>
                <div class="header-left">
                    <div class="mob-trigger" onclick="toggleSidebar()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></div>
                    <h1 style="font-family:'Outfit'; font-size:18px; font-weight:900;">NODE TERMINAL</h1>
                </div>
                <div style="font-size:11px; font-weight:800; color:var(--accent-success);">● LEDGER HANDSHAKE ACTIVE</div>
            </header>

            <div class="workspace">
                
                <!-- LIVE TIER PAYOUT BOARD (SYNCED WITH VIP-CONTROL) -->
                <section class="tier-sync-bar">
                    <div class="tier-info">
                        <h3>Sovereign Yield Matrix</h3>
                        <p>Real-time per-node rewards</p>
                    </div>
                    <div class="tier-badges" id="tierPayoutList">
                        <!-- Tiers injected from vip_tiers collection -->
                        <div class="payout-chip">Syncing Nodes...</div>
                    </div>
                </section>

                <!-- NODE REGISTRATION HANDSHAKE -->
                <div class="editor-card">
                    <h3 style="font-family:'Outfit'; margin-bottom:20px;" id="formTitle">Register Ecosystem Node</h3>
                    <form id="taskForm">
                        <input type="hidden" id="editId">
                        <div class="form-grid">
                            <div class="field">
                                <label>Internal Node Name</label>
                                <input type="text" id="tName" placeholder="e.g. USDT Ledger Audit" required>
                            </div>
                            <div class="field">
                                <label>Asset Pointer (task/a.png)</label>
                                <input type="text" id="tImg" placeholder="e.g. btc.png" required>
                            </div>
                            <div class="field">
                                <label>Strategy Theme</label>
                                <select id="tType">
                                    <option value="standard">Standard (Node White)</option>
                                    <option value="branded">Company Branded (Node Brown)</option>
                                    <option value="sponsor">External Sponsor (Node Red)</option>
                                </select>
                            </div>
                            <div class="field">
                                <label>Consensus Category</label>
                                <input type="text" id="tCat" placeholder="e.g. Technical Audit">
                            </div>
                            <div class="field" style="grid-column: span 2;">
                                <label>Protocol Detail URL</label>
                                <input type="url" id="tLink" placeholder="https://external-node.com/verify">
                            </div>
                        </div>
                        <div class="field" style="margin-top:20px;">
                            <label>Technical Node Parameters (User Desc)</label>
                            <textarea id="tDesc" placeholder="Explain the data processing required for this node..." required style="height:80px;"></textarea>
                        </div>
                        <button type="submit" class="btn-deploy" id="submitBtn">Deploy Protocol Node</button>
                    </form>
                </div>

                <!-- LIVE ANALYTIC GRID -->
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding:0 5px;">
                    <h2 style="font-size:16px; font-weight:800; text-transform:uppercase; letter-spacing:1px;">Technical Pool Ledger</h2>
                    <span id="poolCount" style="font-size:11px; font-weight:900; color:#99a2ad;">0 NODES</span>
                </div>

                <div class="node-grid" id="nodeFeed">
                    <!-- Real-time nodes with independent analytics injected -->
                </div>

            </div>
        </main>
    </div>

    <!-- CORE HANDSHAKE ENGINE -->
    <script type="module">
        import { auth, db } from "../assets/js/firebase-config.js";
        import { 
            doc, onSnapshot, collection, getDoc, setDoc, addDoc, deleteDoc, 
            serverTimestamp, updateDoc, query, orderBy, increment 
        } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        let currentTasks = [];

        // 1. IDENTITY SECURITY HANDSHAKE
        onAuthStateChanged(auth, (user) => {
            if (!user || user.email !== 'arbabnasru@gmail.com') window.location.href = "login.html";
        });

        // 2. DYNAMIC TIER HANDSHAKE (PULLING FROM VIP_TIERS)
        function synchronizeTierYields() {
            onSnapshot(query(collection(db, "vip_tiers"), orderBy("req_referrals", "asc")), (snap) => {
                const list = document.getElementById('tierPayoutList');
                list.innerHTML = "";
                snap.forEach(d => {
                    const t = d.data();
                    list.innerHTML += `<div class="payout-chip">${t.rank_name}: <span>$${t.multiplier}</span></div>`;
                });
            });
        }
        synchronizeTierYields();

        // 3. ANALYTIC POOL SYNCHRONIZER
        function synchronizeNodePool() {
            onSnapshot(collection(db, "tasks_pool"), (snap) => {
                const feed = document.getElementById('nodeFeed');
                document.getElementById('poolCount').innerText = `${snap.size} NODES ONLINE`;
                feed.innerHTML = "";
                currentTasks = [];

                snap.forEach(taskDoc => {
                    const t = taskDoc.data();
                    const id = taskDoc.id;
                    currentTasks.push({ id, ...t });

                    const total = t.total_clicks || 0;
                    const ups = t.votes_up || 0;
                    const downs = t.votes_down || 0;
                    const consensus = total > 0 ? ((ups / total) * 100).toFixed(1) : 0;

                    feed.innerHTML += `
                        <div class="node-card theme-${t.type || 'standard'}">
                            <div class="node-meta">${t.category || 'Protocol Node'}</div>
                            <img src="../assets/task/${t.img}" class="node-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3081/3081840.png'">
                            <div class="node-title">${t.name}</div>
                            
                            <div class="analytic-cluster">
                                <div class="vote-row">
                                    <div class="vote-chip v-up">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>
                                        ${ups}
                                    </div>
                                    <div class="vote-chip v-down">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zM17 2h3a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-3"></path></svg>
                                        ${downs}
                                    </div>
                                </div>
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <span style="font-size:8px; font-weight:800; color:#99a2ad; text-transform:uppercase;">Node Consensus</span>
                                    <b style="font-size:11px; font-weight:900;">${consensus}%</b>
                                </div>
                                <div class="consensus-bar"><div class="consensus-fill" style="width: ${consensus}%"></div></div>
                            </div>

                            <div class="node-actions">
                                <button class="act-btn btn-modify" onclick="modifyProtocolNode('${id}')">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                                </button>
                                <button class="act-btn btn-purge" onclick="purgeProtocolNode('${id}')">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                                </button>
                            </div>
                        </div>
                    `;
                });
            });
        }
        synchronizeNodePool();

        // 4. DEPLOYMENT PROTOCOL
        document.getElementById('taskForm').onsubmit = async (e) => {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;

            const payload = {
                name: document.getElementById('tName').value.trim(),
                img: document.getElementById('tImg').value.trim(),
                type: document.getElementById('tType').value,
                category: document.getElementById('tCat').value.trim(),
                link: document.getElementById('tLink').value.trim(),
                desc: document.getElementById('tDesc').value.trim(),
                last_handshake: serverTimestamp()
            };

            try {
                if(editId) {
                    await updateDoc(doc(db, "tasks_pool", editId), payload);
                    alert("Node Protocol Updated.");
                } else {
                    payload.votes_up = 0;
                    payload.votes_down = 0;
                    payload.total_clicks = 0;
                    await addDoc(collection(db, "tasks_pool"), payload);
                    alert("New Node Deployed to Technical Pool.");
                }
                resetCommandUI();
            } catch (err) { alert("Authorization Error."); }
            btn.disabled = false;
        };

        window.modifyProtocolNode = (id) => {
            const task = currentTasks.find(x => x.id === id);
            if(!task) return;

            document.getElementById('editId').value = id;
            document.getElementById('tName').value = task.name;
            document.getElementById('tImg').value = task.img;
            document.getElementById('tType').value = task.type || "standard";
            document.getElementById('tCat').value = task.category || "";
            document.getElementById('tLink').value = task.link || "";
            document.getElementById('tDesc').value = task.desc;
            
            document.getElementById('formTitle').innerText = "Authorize Protocol Modification";
            document.getElementById('submitBtn').innerText = "Sync Modifications";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.purgeProtocolNode = async (id) => {
            if(confirm("Permanently purge this node from technical pool?")) {
                await deleteDoc(doc(db, "tasks_pool", id));
            }
        };

        function resetCommandUI() {
            document.getElementById('editId').value = "";
            document.getElementById('taskForm').reset();
            document.getElementById('formTitle').innerText = "Register Ecosystem Node";
            document.getElementById('submitBtn').innerText = "Deploy Protocol Node";
        }

        window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');
        document.addEventListener('gesturestart', (e) => e.preventDefault());
    </script>
</body>
</html>
