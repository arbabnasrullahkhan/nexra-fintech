<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NEXRA">
    <link rel="apple-touch-icon" href="assets/ui/logo.png">

    <title>NEXRA | Smart Earning Ecosystem</title>
    <meta name="description" content="Join NEXRA, the world's most secure fintech ecosystem.">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" type="image/png" href="assets/ui/logo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-white: #ffffff;
            --grid-color: rgba(0, 0, 0, 0.035);
            --accent-black: #111111;
            --text-muted: #bcbcbc;
            --loader-bg: #f0f0f2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            width: 100%; height: 100dvh; 
            overflow: hidden !important;
            position: fixed;
            background-color: var(--bg-white);
            font-family: 'Inter', sans-serif;
            touch-action: none; 
            user-select: none;
            display: flex; justify-content: center; align-items: center;
        }

        .bg-layer {
            position: absolute; inset: 0; z-index: 1;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 35px 35px;
            mask-image: radial-gradient(circle at 50% 50%, black, transparent 90%);
            -webkit-mask-image: radial-gradient(circle at 50% 50%, black, transparent 90%);
        }

        .splash-shell {
            position: relative; z-index: 10;
            width: 100%; max-width: 420px;
            height: 100%; display: flex;
            flex-direction: column; justify-content: space-between;
            align-items: center; padding: 12dvh 30px;
        }

        .brand-group { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 24px; }
        .logo-main { width: 90px; height: 90px; object-fit: contain; animation: bounceIn 1s cubic-bezier(0.17, 0.67, 0.6, 1.2) forwards; mix-blend-mode: multiply; }
        .name-img { width: 190px; height: auto; object-fit: contain; mix-blend-mode: multiply; animation: fadeUp 0.8s ease 0.3s both; }
        .tagline { font-size: 11px; font-weight: 600; letter-spacing: 0.35em; text-transform: uppercase; color: var(--text-muted); margin-top: -8px; animation: fadeUp 0.8s ease 0.5s both; }

        .loader-group { display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .battery-loader { display: flex; gap: 7px; align-items: flex-end; height: 25px; }
        .battery-bar { width: 8px; height: 14px; background: var(--loader-bg); border-radius: 2px; animation: batteryBounce 1.2s infinite ease-in-out; }
        .battery-bar:nth-child(2) { animation-delay: 0.15s; }
        .battery-bar:nth-child(3) { animation-delay: 0.3s; }
        .battery-bar:nth-child(4) { animation-delay: 0.45s; }
        .footer-credit { font-size: 12px; color: #d1d1d6; font-weight: 500; letter-spacing: 0.2px; }

        @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.5); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes batteryBounce { 0%, 100% { background: var(--loader-bg); height: 14px; } 50% { background: var(--accent-black); height: 22px; } }

        .exit-effect { opacity: 0; transform: translateY(-10px); filter: blur(8px); transition: all 0.8s cubic-bezier(0.64, 0, 0.78, 0); }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="splash-shell" id="app-shell">
        <div class="brand-group">
            <img src="assets/ui/logo.png" alt="Logo" class="logo-main">
            <img src="assets/ui/name.png" alt="NEXRA" class="name-img">
            <span class="tagline">Smart Earning Ecosystem</span>
        </div>

        <div class="loader-group">
            <div class="battery-loader">
                <div class="battery-bar"></div>
                <div class="battery-bar"></div>
                <div class="battery-bar"></div>
                <div class="battery-bar"></div>
            </div>
            <p class="footer-credit">Powered by l NEXRA Community</p>
        </div>
    </div>

    <script type="module">
        import { db, doc, getDoc, auth, onAuthStateChanged } from "./assets/js/firebase-config.js";

        async function initializeNEXRA() {
            const shell = document.getElementById('app-shell');
            
            try {
                // 1. Maintenance Check
                const settingsSnap = await getDoc(doc(db, "settings", "app"));
                const isMaintenance = settingsSnap.exists() ? settingsSnap.data().maintenance : false;

                // 2. BOOT ROUTING
                setTimeout(() => {
                    shell.classList.add('exit-effect');

                    setTimeout(() => {
                        if (isMaintenance) {
                            window.location.replace('auth/checkpoint.html');
                        } else {
                            // Check Auth State
                            onAuthStateChanged(auth, (user) => {
                                if (user) {
                                    // Already logged in, go check verification status
                                    window.location.replace('auth/checkpoint.html');
                                } else {
                                    // New or logged out user
                                    const hasVisited = localStorage.getItem('nexra_onboarded');
                                    if (!hasVisited) {
                                        localStorage.setItem('nexra_onboarded', 'true');
                                        window.location.replace('intro.html');
                                    } else {
                                        window.location.replace('auth/login.html');
                                    }
                                }
                            });
                        }
                    }, 800);
                }, 3000);

            } catch (error) {
                console.error("System Boot Failure:", error);
                setTimeout(() => window.location.replace('auth/login.html'), 3500);
            }
        }

        window.onload = initializeNEXRA;
    </script>
</body>
</html>
